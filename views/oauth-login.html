<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Vincular Pier Repostería con Alexa</title>
  <style>
    :root {
      --purple: #2D1B4E;
      --green:  #6b7c3e;
      --gold:   #d4a574;
      --sand:   #f5f1ed;
      --error:  #b94a4a;
      --text:   #2a2a2a;
      --muted:  #6b6b6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, var(--purple) 0%, #44286f 100%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--sand);
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.3);
    }
    .brand {
      text-align: center;
      margin-bottom: 24px;
    }
    .brand h1 {
      color: var(--purple);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .brand p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }
    .alexa-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--gold);
      color: var(--purple);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 14px;
    }
    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--purple);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #d8d2c8;
      border-radius: 10px;
      font-size: 15px;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      color: var(--text);
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(107,124,62,0.15);
    }
    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.05s, box-shadow 0.15s;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary {
      background: var(--green);
      color: white;
      margin-top: 4px;
    }
    .btn-primary:hover { background: #5a6a35; }
    .btn-google {
      background: white;
      color: #3c4043;
      border: 1.5px solid #dadce0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      margin-top: 12px;
    }
    .btn-google:hover { background: #f8f9fa; }
    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0 12px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #d8d2c8;
    }
    .error {
      background: rgba(185,74,74,0.10);
      color: var(--error);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }
    .error.show { display: block; }
    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 18px;
      line-height: 1.5;
    }
    .footer strong { color: var(--purple); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <span class="alexa-badge">🔗 Vinculando con Alexa</span>
        <h1>Pier Repostería</h1>
        <p>Inicia sesión para que Alexa pueda acceder a tu cuenta</p>
      </div>

      <div id="error" class="error"></div>

      <form id="loginForm" method="POST" action="/api/oauth/login" autocomplete="off">
        <input type="hidden" name="client_id" id="client_id" />
        <input type="hidden" name="redirect_uri" id="redirect_uri" />
        <input type="hidden" name="state" id="state" />

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" name="email" id="email" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" name="password" id="password" required autocomplete="current-password" />
        </div>

        <button type="submit" class="btn btn-primary">Iniciar sesión</button>
      </form>

      <div class="divider">o</div>

      <a id="googleBtn" href="#" class="btn btn-google">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09A7.04 7.04 0 0 1 5.45 12c0-.73.13-1.43.37-2.09V7.07H2.18a11.04 11.04 0 0 0 0 9.86l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/>
        </svg>
        Continuar con Google
      </a>

      <div class="footer">
        Al iniciar sesión, autorizas a <strong>Alexa</strong> a consultar la información de tu cuenta de Pier Repostería en tu nombre.
        <br/>
        <a href="https://pier-reposteria.vercel.app/legales" target="_blank" style="color: var(--green);">Términos y privacidad</a>
      </div>
    </div>
  </div>

  <script>
    // Leer params del Account Linking de la URL y meterlos en los hidden inputs
    (function () {
      const params = new URLSearchParams(window.location.search);
      const clientId    = params.get('client_id') || '';
      const redirectUri = params.get('redirect_uri') || '';
      const state       = params.get('state') || '';
      const errorCode   = params.get('error') || '';

      document.getElementById('client_id').value    = clientId;
      document.getElementById('redirect_uri').value = redirectUri;
      document.getElementById('state').value        = state;

      // Mostrar errores si vienen como query param (?error=invalid_credentials)
      if (errorCode) {
        const errEl = document.getElementById('error');
        const mensajes = {
          invalid_credentials: 'Correo o contraseña incorrectos. Verifica e intenta de nuevo.',
          missing_fields:      'Por favor llena correo y contraseña.',
          google_auth_failed:  'No se pudo iniciar sesión con Google. Intenta de nuevo.',
        };
        errEl.textContent = mensajes[errorCode] || 'No se pudo iniciar sesión. Intenta de nuevo.';
        errEl.classList.add('show');
      }

      // Botón de Google: arma la URL del /api/oauth/google con los mismos params
      const googleBtn = document.getElementById('googleBtn');
      const qs = new URLSearchParams({ client_id: clientId, redirect_uri: redirectUri, state }).toString();
      googleBtn.href = '/api/oauth/google?' + qs;
    })();
  </script>
</body>
</html>
